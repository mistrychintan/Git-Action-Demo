name: workflow-1
on: push

jobs:
  job-1:
    runs-on: ubuntu-22.04
    steps:
      - name: get code
        uses: actions/checkout@v3
      - name: set up nodejs
        uses: actions/setup-node@v3

        with:
          node-version: 18
          - name: Install dependencies
            run: npm install
          - name: Run tetes
            run: npm test
          - name: Build
            run: npm run build
          - name: Deploy
            run: echo"Deployeing to production"
